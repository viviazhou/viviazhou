<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 50" width="360" height="50">
  <style>
    text {
      font-family: 'Raleway', 'Helvetica Neue', Arial, sans-serif;
      font-size: 28px;
      font-weight: 500;
    }
    .letter {
      fill: #000;
      animation-name: flicker;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
    }
    .gold { --color: #F3DBA4; }
    .green { --color: #CCE6A0; }
    .olive { --color: #DEE1A1; }
    .peach { --color: #F9D9C0; }
    .pink { --color: #F7D7E3; }
    .d1 { animation-duration: 8.6s; animation-delay: -0.2s; }
    .d2 { animation-duration: 9.4s; animation-delay: -4.8s; }
    .d3 { animation-duration: 8.9s; animation-delay: -7.4s; }
    .d4 { animation-duration: 9.8s; animation-delay: -2.1s; }
    .d5 { animation-duration: 10.2s; animation-delay: -8.8s; }
    .d6 { animation-duration: 9.1s; animation-delay: -5.6s; }
    .d7 { animation-duration: 8.7s; animation-delay: -1.2s; }
    .d8 { animation-duration: 9.6s; animation-delay: -6.5s; }
    .d9 { animation-duration: 8.8s; animation-delay: -3.1s; }
    .d10 { animation-duration: 10.1s; animation-delay: -0.9s; }
    .d11 { animation-duration: 9.2s; animation-delay: -7s; }
    .d12 { animation-duration: 8.5s; animation-delay: -4s; }
    .d13 { animation-duration: 10.3s; animation-delay: -9.7s; }
    .d14 { animation-duration: 9s; animation-delay: -2.8s; }
    .d15 { animation-duration: 9.9s; animation-delay: -6s; }
    .d16 { animation-duration: 8.4s; animation-delay: -4.9s; }
    .d17 { animation-duration: 9.5s; animation-delay: -1.7s; }
    .d18 { animation-duration: 10s; animation-delay: -8.1s; }
    @keyframes flicker {
      0%, 10% { fill: #000; }
      28%, 48% { fill: var(--color); }
      66%, 100% { fill: #000; }
    }
  </style>
  <text x="0" y="36" xml:space="preserve"><tspan class="letter gold d1">H</tspan><tspan class="letter green d2">i</tspan><tspan class="letter olive d3">!</tspan><tspan> </tspan><tspan class="letter peach d4">I</tspan><tspan class="letter pink d5">t</tspan><tspan class="letter gold d6">'</tspan><tspan class="letter green d7">s</tspan><tspan> </tspan><tspan class="letter olive d8">V</tspan><tspan class="letter peach d9">i</tspan><tspan class="letter pink d10">v</tspan><tspan class="letter gold d11">i</tspan><tspan class="letter green d12">a</tspan><tspan class="letter olive d13">n</tspan><tspan> </tspan><tspan class="letter peach d14">Z</tspan><tspan class="letter pink d15">h</tspan><tspan class="letter gold d16">o</tspan><tspan class="letter green d17">u</tspan><tspan class="letter olive d18">.</tspan></text>
</svg>
